<!DOCTYPE html>
<html>
<head>
    <title>Modern Chat UI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a1f44, #6a11cb);
        }

        /* Glass Panel */
        .panel {
            width: 900px;
            height: 550px;
            border-radius: 20px;
            display: flex;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .right {
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Chat container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        /* Message bubbles */
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
            backdrop-filter: blur(10px);
        }

        .user {
            background: rgba(255,255,255,0.15);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .system {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .date-label {
            display: block;
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        select {
            border-radius: 10px;
            border: none;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* 🔥 FIXED DROPDOWN ISSUE */
        select option {
            color: black;
            background: white;
        }

        button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="panel">

    <div class="right">

        <div id="chat-container"></div>

        <div class="input-area">
            <select id="language">
                <option value="as">Assamese</option>
                <option value="bn">Bengali</option>
                <option value="brx">Bodo</option>
                <option value="doi">Dogri</option>
                <option value="gu">Gujarati</option>
                <option value="hi">Hindi</option>
                <option value="kn">Kannada</option>
                <option value="ks">Kashmiri</option>
                <option value="kok">Konkani</option>
                <option value="mai">Maithili</option>
                <option value="ml">Malayalam</option>
                <option value="mni">Manipuri</option>
                <option value="mr">Marathi</option>
                <option value="ne">Nepali</option>
                <option value="or">Odia</option>
                <option value="pa">Punjabi</option>
                <option value="sa">Sanskrit</option>
                <option value="sat">Santali</option>
                <option value="sd">Sindhi</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="ur">Urdu</option>
            </select>

            <input type="text" id="userInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<script>
    const container = document.getElementById('chat-container');

    function addBubble(text, sender, date = "") {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerHTML = `<pre style="margin:0">${text}</pre>`;

        if(date) {
            div.innerHTML += `<span class="date-label">${date}</span>`;
        }

        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    window.onload = async () => {

        // ✅ Welcome Message
        addBubble("Hello User 👋", "system");

        // Load previous chat
        const res = await fetch('/history');
        const history = await res.json();

        history.forEach(m => addBubble(m.text, m.sender, m.date_str));
    };

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const lang = document.getElementById('language').value;
        const val = input.value;

        if(!val) return;

        addBubble(val, 'user');
        input.value = '';

        const res = await fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: val, lan: lang})
        });

        const data = await res.json();
        addBubble(data.reply, 'system', data.date);
    }
</script>

</body>
</html>
