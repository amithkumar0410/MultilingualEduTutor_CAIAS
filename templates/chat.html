<!DOCTYPE html>
<html>
<head>
    <title>Modern Purple Chat UI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #1a0033, #0a001a 70%);
            color: #eee;
        }

        .panel {
            width: 920px;
            height: 560px;
            border-radius: 20px;
            display: flex;
            backdrop-filter: blur(25px);
            background: rgba(30, 0, 60, 0.45);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .right {
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 18px;
        }

        /* HEADER */
        .header {
            padding: 10px 12px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #e9d5ff;
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        /* CHAT */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        #chat-container::-webkit-scrollbar {
            width: 6px;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: rgba(200,150,255,0.3);
            border-radius: 10px;
        }

        /* BUBBLES */
        .bubble {
            max-width: 60%;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;

            word-wrap: break-word;
            overflow-wrap: anywhere;
            word-break: break-word;

            backdrop-filter: blur(12px);
        }

        .msg-text {
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        /* USER RIGHT */
        .user {
            background: linear-gradient(135deg, #7b2cff, #a855f7);
            color: white;
            align-self: flex-end;
            box-shadow: 0 8px 20px rgba(123,44,255,0.4);
        }

        /* SYSTEM LEFT */
        .system {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
            align-self: flex-start;
        }

        .date-label {
            display: block;
            font-size: 10px;
            margin-top: 6px;
            opacity: 0.6;
        }

        /* INPUT */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.07);
            color: white;
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        select {
            border-radius: 10px;
            border: none;
            padding: 10px;
            background: rgba(255,255,255,0.07);
            color: white;
        }

        select option {
            color: black;
            background: white;
        }

        button {
            background: linear-gradient(135deg, #9333ea, #c084fc);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(160, 80, 255, 0.5);
        }
    </style>
</head>

<body>

<div class="panel">
    <div class="right">

        <div class="header">
            <div class="title">💬 AI Chat</div>
            <div class="subtitle">Welcome back, User</div>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <select id="language">
                <option value="hi">Hindi</option>
                <option value="kn">Kannada</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="bn">Bengali</option>
                <option value="mr">Marathi</option>
                <option value="ur">Urdu</option>
            </select>

            <input type="text" id="userInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<script>
const container = document.getElementById('chat-container');

function addBubble(text, sender, date = "") {
    const div = document.createElement('div');
    div.className = `bubble ${sender}`;
    div.innerHTML = `<div class="msg-text">${text}</div>`;

    if(date) {
        div.innerHTML += `<span class="date-label">${date}</span>`;
    }

    container.appendChild(div);

    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
    if (isAtBottom) {
        container.scrollTop = container.scrollHeight;
    }
}

window.onload = async () => {
    const res = await fetch('/history');
    const history = await res.json();
    history.forEach(m => addBubble(m.text, m.sender, m.date_str));
};

async function sendMessage() {
    const input = document.getElementById('userInput');
    const lang = document.getElementById('language').value;
    const val = input.value;

    if(!val) return;

    addBubble(val, 'user');
    input.value = '';

    try {
        const res = await fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: val, lan: lang})
        });

        const data = await res.json();

        let reply = data.reply;

        // Clean ugly API errors
        if (reply && reply.includes("403")) {
            reply = "⚠️ API key invalid or quota exceeded.";
        }

        addBubble(reply || "No response", 'system', data.date);

    } catch (err) {
        addBubble("⚠️ Server error. Check backend.", 'system');
    }
}

/* Enter key support */
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
